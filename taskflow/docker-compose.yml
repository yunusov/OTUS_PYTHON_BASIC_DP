services:

  pg:
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  maildev:
    image: maildev/maildev
    environment:
      - TZ=Europe/Moscow
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
    ports:
      - "8080:1080"
      - "1025:1025"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"